
<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; color: var(--color-text-primary); }
  .app { display: flex; flex-direction: column; height: 620px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  .header { padding: 14px 20px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px; background: var(--color-background-secondary); }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
  .header-title { font-size: 14px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
  .chips { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { font-size: 12px; padding: 5px 12px; border-radius: 100px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .chip:hover { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 4px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 92%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
  .avatar.ai { background: #E1F5EE; color: #0F6E56; border: 0.5px solid #9FE1CB; }
  .avatar.user { background: var(--color-background-info); color: var(--color-text-info); }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .msg.user .bubble { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 14px 4px 14px 14px; }
  .msg.assistant .bubble { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px 14px 14px 14px; }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 500; color: #0F6E56; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 4px; }
  .bubble code { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-secondary); padding: 1px 5px; border-radius: 4px; }
  .error-bubble { background: var(--color-background-danger) !important; border-color: var(--color-border-danger) !important; color: var(--color-text-danger); font-size: 13px; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-secondary); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .input-area { border-top: 0.5px solid var(--color-border-tertiary); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; background: var(--color-background-secondary); }
  textarea { flex: 1; resize: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 12px; font-size: 14px; font-family: var(--font-sans); line-height: 1.5; background: var(--color-background-primary); color: var(--color-text-primary); min-height: 40px; max-height: 120px; outline: none; }
  textarea:focus { border-color: #1D9E75; }
  textarea::placeholder { color: var(--color-text-tertiary); }
  .send-btn { width: 36px; height: 36px; border-radius: var(--border-radius-md); border: none; background: #1D9E75; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .welcome { text-align: center; padding: 24px 16px; color: var(--color-text-secondary); }
  .welcome h3 { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; margin-top: 10px; }
  .welcome p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">AI Semiconductor Process Engineer Assistant</h2>
<div class="app">
  <div class="header">
    <div class="header-dot"></div>
    <div><div class="header-title">Process Engineer AI</div></div>
    <div class="header-sub">Etch · Litho · CMP · Thin Films</div>
  </div>
  <div class="chips">
    <div class="chip" onclick="sendChip('My silicon etch rate dropped 15% after 50 wafers. What is happening and how do I recover it?')">Etch rate drop</div>
    <div class="chip" onclick="sendChip('What causes CD variation across wafer in lithography and how do I fix it?')">CD variation</div>
    <div class="chip" onclick="sendChip('My CMP removal rate is non-uniform — center is over-polishing by 12%. Top root causes?')">CMP non-uniformity</div>
    <div class="chip" onclick="sendChip('PECVD vs ALD for thin film deposition — when would you choose each?')">PECVD vs ALD</div>
    <div class="chip" onclick="sendChip('Walk me through a DMAIC root cause analysis for a yield drop after an etch step.')">DMAIC yield drop</div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome">
      <i class="ti ti-cpu" style="font-size:32px; color:#1D9E75" aria-hidden="true"></i>
      <h3>Your semiconductor process AI</h3>
      <p>Ask anything about etch, lithography, CMP,<br>thin films, or process optimization.</p>
    </div>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="Ask about etch rates, CD variation, CMP, thin films..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>
<script>
const SYSTEM = `You are an expert semiconductor process engineer AI assistant. You have deep hands-on knowledge in:
- Dry etching (RIE, ICP, CCP): etch rate, selectivity, profile control, loading effects, micro-loading, RIE lag
- Lithography: CD control, overlay, focus/exposure, photoresist chemistry, OPC, process window
- CMP: removal rate, within-wafer non-uniformity, selectivity, pad conditioning, slurry chemistry, dishing, erosion
- Thin film deposition: PECVD, LPCVD, ALD, PVD, film stress, conformality, step coverage
- Wafer cleaning: RCA clean, wet chemistry, particle removal
- Process control: SPC, Cpk/Ppk, Western Electric rules, DOE, DMAIC, FMEA, root cause analysis
Be direct and technical. Give actionable answers. Bold key terms. Use bullet points for lists. Be concise but never superficial.`;

let history = [];
let busy = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendChip(t) {
  document.getElementById('input').value = t;
  sendMessage();
}

function fmt(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .split('\n\n').map(p => {
      if (/^[-•]/.test(p.trim())) {
        const items = p.split('\n').filter(l=>l.trim()).map(l=>`<li>${l.replace(/^[-•]\s*/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</li>`).join('');
        return `<ul>${items}</ul>`;
      }
      if (/^\d+\./.test(p.trim())) {
        const items = p.split('\n').filter(l=>l.trim()).map(l=>`<li>${l.replace(/^\d+\.\s*/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</li>`).join('');
        return `<ol>${items}</ol>`;
      }
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    }).join('');
}

function addMsg(role, content, isError) {
  const c = document.getElementById('messages');
  const welcome = c.querySelector('.welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'assistant' ? 'ai' : 'user'}`;
  av.textContent = role === 'assistant' ? 'AI' : 'You';

  const bub = document.createElement('div');
  bub.className = 'bubble' + (isError ? ' error-bubble' : '');

  if (role === 'assistant' && !isError) {
    bub.innerHTML = fmt(content);
  } else {
    bub.textContent = content;
  }

  wrap.appendChild(av);
  wrap.appendChild(bub);
  c.appendChild(wrap);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg assistant'; d.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = 'AI';
  const b = document.createElement('div');
  b.className = 'bubble typing';
  b.innerHTML = '<span></span><span></span><span></span>';
  d.appendChild(av); d.appendChild(b);
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      const errMsg = data?.error?.message || `API error ${res.status}: ${res.statusText}`;
      addMsg('assistant', errMsg, true);
    } else {
      const reply = data.content?.[0]?.text || 'No response returned.';
      addMsg('assistant', reply);
      history.push({ role: 'assistant', content: reply });
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant', `Network error: ${e.message}. Check your connection and try again.`, true);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
